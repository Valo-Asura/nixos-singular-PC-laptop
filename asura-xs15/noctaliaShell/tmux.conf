# Enable 256 colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse
set -g mouse on

# Status bar configuration
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=#cdd6f4"

set -g status-left ""
set -g status-right-length 150

# Left side window status as flat square capsules
set -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I #[fg=#cdd6f4,bg=#313244,nobold] #W "
set -g window-status-format "#[fg=#bac2de,bg=#313244] #I #[fg=#a6adc8,bg=#181825] #W "

# Right side system status with flat square time capsule
set -g status-right "#[fg=#89b4fa,bg=default]#[fg=#cdd6f4]#(basename #{pane_current_path}) #[fg=#a6adc8]|  #(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null || echo 100)% #[fg=#a6adc8]| #[fg=#1e1e2e,bg=#89b4fa,bold] %H:%M ⓘ "

