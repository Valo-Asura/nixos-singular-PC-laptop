[module/xworkspaces]
type = internal/xworkspaces

label-active = "󰝥"
label-active-foreground = ${colors.blue}
label-active-background = ${colors.background-alt}
label-active-padding = 2

label-occupied = "󰝥"
label-occupied-foreground = ${colors.primary}
label-occupied-background = ${colors.background-alt}
label-occupied-padding = 2

label-urgent = "󰝥"
label-urgent-foreground = ${colors.alert}
label-urgent-background = ${colors.background-alt}
label-urgent-padding = 2

label-empty = "󰝥"
label-empty-foreground = ${colors.disabled}
label-empty-background = ${colors.background-alt}
label-empty-padding = 2

[module/bspwm]
type = custom/script
exec = cat $HOME/.config/bspwm/scripts/current-layout
click-left = $HOME/.config/bspwm/scripts/switch-layouts
interval = 1
format = <label>
label = "   %output%"
label-font = 15
format-foreground = ${colors.blue}
format-padding = 0

[module/launcher]
type = custom/text
content = "󱓞"
content-foreground = ${colors.blue}
click-left = rofi -show drun
content-padding = 3
content-font = 3

[module/powermenu]
type = custom/text
content = "   "
content-foreground = ${colors.alert}
click-left = eww open-many --toggle background-closer powermenu 
content-padding = 0
content-font = 5

[module/tray]
type = custom/script
exec = tail -F $HOME/.config/polybar/scripts/tray-status 2> /dev/null
click-left = $HOME/.config/polybar/scripts/tray --toggle
tail = true
label-font = 13
label-padding = 3

[module/date]
type = internal/date
interval = 1

date = %I:%M %p
date-alt = %a,  %B %d

label = "%{A1:eww open-many --toggle background-closer main:}%date%%{A}"
label-foreground = ${colors.foreground}

[module/network]
type = internal/network
; Name of the network interface to display. You can get the names of the
; interfaces on your machine with `ip link`
; Wireless interfaces often start with `wl` and ethernet interface with `eno` or `eth`
; Use interface-type so the same config works on laptops with wlp* names.

; If no interface is specified, polybar can detect an interface of the given type.
; If multiple are found, it will prefer running interfaces and otherwise just
; use the first one found.
; Either 'wired' or 'wireless'
; New in version 3.6.0
interface-type = wireless

; Seconds to sleep between updates
; Default: 1
interval = 3.0

; Test connectivity every Nth update
; A value of 0 disables the feature
; NOTE: Experimental (needs more testing)
; Default: 0
;ping-interval = 3

; @deprecated: Define min width using token specifiers (%downspeed:min% and %upspeed:min%)
; Minimum output width of upload/download rate
; Default: 3
udspeed-minwidth = 5

; Accumulate values from all interfaces
; when querying for up/downspeed rate
; Default: false
accumulate-stats = true

; Consider an `UNKNOWN` interface state as up.
; Some devices like USB network adapters have 
; an unknown state, even when they're running
; Default: false
unknown-as-up = true

; Available tags:
;   <label-connected> (default)
;   <ramp-signal>
format-connected = "%{A1:$HOME/.config/eww/System-Menu/launch:}<ramp-signal>%{A}"

; Available tags:
;   <label-disconnected> (default)
format-disconnected = <label-disconnected>

; Default: (none)
label-disconnected = "%{A1:$HOME/.config/eww/System-Menu/launch:}󰤭%{A}"
label-disconnected-foreground = ${colors.alert}
label-disconnected-background = ${colors.background-alt}
label-disconnected-font = 7
label-disconnected-padding = 1

; Only applies if <ramp-signal> is used
ramp-signal-0 = "󰤯"
ramp-signal-1 = "󰤟"
ramp-signal-2 = "󰤢"
ramp-signal-3 = "󰤥"
ramp-signal-4 = "󰤨"
ramp-signal-foreground = ${colors.foreground}
ramp-signal-background = ${colors.background-alt}
ramp-signal-font = 7
ramp-signal-padding = 1

[module/battery]
type = custom/script
exec = ~/.config/polybar/scripts/battery-status
interval = 5
format = "%{A1:$HOME/.config/eww/System-Menu/launch:}<label>%{A}"
format-background = ${colors.background-alt}
format-foreground = ${colors.foreground}
format-font = 6
format-padding = 1
label = %output%

[module/memory]
type = custom/script
exec = ~/.config/polybar/scripts/memory-gb
interval = 3
format = <label>
format-background = ${colors.background-alt}
format-foreground = ${colors.foreground}
format-font = 14
format-padding = 1
label = %output%

[module/pulseaudio]
type = custom/script
exec = ~/.config/polybar/scripts/volume-status
interval = 2
format = "%{A1:$HOME/.config/eww/System-Menu/launch:}<label>%{A}"
format-background = ${colors.background-alt}
format-foreground = ${colors.foreground}
format-font = 9
format-padding = 1
label = %output%
click-right = amixer sset Master toggle

[module/github]
type = custom/script
exec = $HOME/.config/polybar/scripts/github
format = <label>
label = %output%
format-prefix = "󰊤 "
format-prefix-font = 3
interval = 60
format-padding = 3

[module/updates]
type = custom/script
exec = ~/.config/polybar/scripts/updates
format = <label>
label = "%output%"
format-foreground = ${colors.foreground}
format-background = ${colors.background-alt}
label-font = 12
format-font = 6
format-prefix = " "
interval = 7200
click-left = kitty --hold sh -lc 'nixos-rebuild list-generations || true'

[module/seperator]
type = custom/text
content = "  "
content-font = 3

[module/spotify]
type = custom/script
tail = true
interval = 1
format-prefix = "%{A1:eww open-many --toggle background-closer player:} %{A}"
format-prefix-padding = 1
format-font = 14
label-font = 13
format-background = ${colors.background-alt} 
format-foreground = ${colors.foreground}
format = "%{A1:eww open-many --toggle background-closer player:}<label>%{A}"
exec = ~/.config/polybar/scripts/scroll-spotify

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth
interval = 2
click-left = exec blueberry
click-right = exec ~/.config/polybar/scripts/toggle-bluetooth
format-padding = 1
format-font = 2
format-background = ${colors.background-alt}
format-foreground = ${colors.foreground}

[module/microphone]
type = custom/script
exec = ~/.config/polybar/scripts/microphone
interval = 5
format-padding = 1
format-font = 14
format-background = ${colors.background-alt}
format-foreground = ${colors.foreground}

[module/gamemode]
type = custom/script
exec = ~/.config/polybar/scripts/gamemode
interval = 2
format-padding = 1
format-font = 5
format-background = ${colors.background-alt}
format-foreground = ${colors.foreground}
